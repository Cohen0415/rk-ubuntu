RK_UBUNTU_HOSTNAME=rk3576-ubuntu

# Put rk3576-specific packages and overlays under this directory:
#   chips/rk3576/packages/<arch>/
#   chips/rk3576/overlay/
#   chips/rk3576/overlay-firmware/
#   chips/rk3576/overlay-debug/
#
# Set this when the rk3576 AIQ package is added, for example:
# RK_UBUNTU_RKAIQ_DEB=/packages/rkaiq/camera_engine_rkaiq_rk3576_arm64.deb
#
# Set this when the rk3576 GPU package is added, for example:
# RK_UBUNTU_GPU_DEBS="/packages/libmali/<rk3576-libmali-package>.deb"

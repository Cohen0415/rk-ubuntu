RK_UBUNTU_HOSTNAME=rk3588-ubuntu

# Put rk3588-specific packages and overlays under this directory:
#   chips/rk3588/packages/<arch>/
#   chips/rk3588/overlay/
#   chips/rk3588/overlay-firmware/
#   chips/rk3588/overlay-debug/
#
# Set this when the rk3588 AIQ package is added, for example:
# RK_UBUNTU_RKAIQ_DEB=/packages/rkaiq/camera_engine_rkaiq_rk3588_arm64.deb
#
# Set this when the rk3588 GPU package is added, for example:
# RK_UBUNTU_GPU_DEBS="/packages/libmali/libmali-valhall-g610-g24p0-x11-wayland-gbm_1.9-1_arm64.deb"
